<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>物理基礎クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body tabindex="0">
  <div class="viewport">
    <div class="game-screen" id="gameScreen">
      <section class="screen screen-title" id="screenTitle">
        <div class="box-frame">
          <div class="box-inner">
            <h1 class="game-title">物理基礎</h1>
            <p class="game-subtitle">力学 ４択クイズ</p>
            <div class="title-divider">━━━━━━━━━━━━</div>
            <p class="menu-item selected" id="startItem">
              <span class="cursor">▶</span> START
            </p>
            <button type="button" class="action-btn" id="btnStart">START</button>
            <p class="hint-text hint-keyboard">Enter で開始</p>
            <p class="hint-text hint-touch">STARTをタップ → もう一度タップで開始</p>
          </div>
        </div>
        <p class="copyright">© PHYSICS QUIZ 2026</p>
      </section>

      <section class="screen screen-quiz hidden" id="screenQuiz">
        <div class="box-frame">
          <div class="box-inner">
            <div class="status-bar">
              <span id="questionCounter">Q.1/5</span>
              <span id="scoreDisplay">SCORE: 0</span>
            </div>
            <div class="question-area">
              <p class="question-label">問題</p>
              <p class="question-text" id="questionText"></p>
            </div>
            <div class="choices-area" id="choicesArea"></div>
            <button type="button" class="action-btn" id="btnSubmit">決定</button>
            <p class="hint-text hint-keyboard">↑↓ で選択　Enter で決定</p>
            <p class="hint-text hint-touch">選択肢をタップ → もう一度タップで回答</p>
          </div>
        </div>
      </section>

      <section class="screen screen-result hidden" id="screenResult">
        <div class="box-frame">
          <div class="box-inner result-inner">
            <p class="result-label" id="resultLabel">正解！</p>
            <div class="result-divider">────────────</div>
            <p class="result-answer" id="resultAnswer"></p>
            <p class="explanation-text" id="explanationText"></p>
            <button type="button" class="action-btn" id="btnNext">次の問題へ</button>
            <p class="hint-text hint-keyboard">Enter で次へ</p>
            <p class="hint-text hint-touch">ボタンをタップ</p>
          </div>
        </div>
      </section>

      <section class="screen screen-score hidden" id="screenScore">
        <div class="box-frame">
          <div class="box-inner score-inner">
            <h2 class="score-title">RESULT</h2>
            <div class="score-divider">━━━━━━━━━━━━</div>
            <p class="score-value" id="finalScore">0 / 5</p>
            <p class="score-rank" id="scoreRank"></p>
            <div class="score-divider">━━━━━━━━━━━━</div>
            <p class="menu-item selected" id="retryItem">
              <span class="cursor">▶</span> RETRY
            </p>
            <button type="button" class="action-btn" id="btnRetry">RETRY</button>
            <p class="hint-text hint-keyboard">Enter でリトライ</p>
            <p class="hint-text hint-touch">タップでリトライ</p>
          </div>
        </div>
      </section>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
